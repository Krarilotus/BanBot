services:
  discord-trap-ban-bot:
    image: ${BANBOT_IMAGE:-ghcr.io/krarilotus/banbot:latest}
    container_name: discord-trap-ban-bot
    restart: unless-stopped
    env_file:
      - .env
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data:/data
    init: true
